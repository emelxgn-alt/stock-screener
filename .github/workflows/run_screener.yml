name: Run Stock Screener Daily

on:
  schedule:
    - cron: '0 1 * * *'   # Runs every day at 1:00 AM UTC (9AM Singapore time)
  workflow_dispatch:        # Also lets you run it manually with a button

permissions:
  contents: write           # Needed to save index.html back to the repo

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Check out the code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install libraries
        run: pip install -r requirements.txt

      - name: 🚀 Run the screener
        run: python screener.py

      - name: 💾 Save the HTML back to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "📊 Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Nothing to commit"
          git push
